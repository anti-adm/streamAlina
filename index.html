<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links</title>

  <style>
    :root {
      color-scheme: dark;

      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.62);

      --glass: rgba(255, 255, 255, 0.055);
      --glass-strong: rgba(255, 255, 255, 0.105);
      --glass-soft: rgba(255, 255, 255, 0.022);

      --stroke: rgba(255, 255, 255, 0.30);
      --stroke-soft: rgba(255, 255, 255, 0.13);
      --chrome: rgba(255, 255, 255, 0.72);

      --radius-xl: 38px;
      --radius-md: 22px;

      --ease-out: cubic-bezier(.22, 1, .36, 1);
      --ease-slow: cubic-bezier(.16, 1, .3, 1);
      --ease-elastic: cubic-bezier(.18, 1.28, .28, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      margin: 0;
      min-height: 100%;
      background: #010103;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      color: var(--text);
      background: transparent;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url("./background.png");
      background-size: cover;
      background-position: 38% center;
      background-repeat: no-repeat;
      transform: scale(1.018);
      filter: brightness(1.08) contrast(1.14) saturate(1.08);
      pointer-events: none;
    }

    @media (max-width: 768px) {
      body::before {
        background-image: url("./background-mobile.png");
        background-position: center center;
        background-size: cover;
        transform: scale(1.01);
        filter: brightness(1.08) contrast(1.12) saturate(1.08);
      }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 48%, rgba(0,0,0,0.03), transparent 34%),
        radial-gradient(circle at 18% 18%, rgba(70, 112, 180, 0.10), transparent 30%),
        radial-gradient(circle at 84% 78%, rgba(255,255,255,0.07), transparent 28%),
        linear-gradient(180deg, rgba(0,0,0,0.16), rgba(0,0,0,0.22) 70%, rgba(0,0,0,0.38));
    }

    .bg-glow {
      position: fixed;
      inset: -20%;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 20%, rgba(157, 196, 255, 0.13), transparent 22%),
        radial-gradient(circle at 72% 18%, rgba(255,255,255,0.08), transparent 20%),
        radial-gradient(circle at 58% 82%, rgba(190, 210, 255, 0.08), transparent 24%);
      filter: blur(42px);
      opacity: .78;
      animation: bgGlowMove 18s ease-in-out infinite alternate;
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: 3;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: var(--s);
      height: var(--s);
      left: var(--x);
      top: var(--y);
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      box-shadow:
        0 0 8px rgba(255,255,255,.86),
        0 0 18px rgba(170,210,255,.42),
        0 0 34px rgba(255,255,255,.18);
      opacity: 0;
      animation:
        starFloat var(--d) ease-in-out infinite,
        starBlink var(--b) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .star::before,
    .star::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      width: calc(var(--s) * 5.2);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.9), transparent);
      transform: translate(-50%, -50%);
      opacity: .48;
    }

    .star::after {
      width: 1px;
      height: calc(var(--s) * 5.2);
      background: linear-gradient(180deg, transparent, rgba(255,255,255,.9), transparent);
    }

    .firefly {
      position: fixed;
      z-index: 4;
      pointer-events: none;
      left: var(--x);
      top: var(--y);
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.95);
      box-shadow:
        0 0 10px rgba(255,255,255,.95),
        0 0 24px rgba(130,180,255,.46),
        0 0 44px rgba(255,255,255,.24);
      opacity: .44;
      animation: fireflyMove var(--time) ease-in-out infinite alternate;
      animation-delay: var(--delay);
    }

    .page {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px 18px;
    }

    .card {
      position: relative;
      width: min(100%, 455px);
      padding: 22px;
      border-radius: var(--radius-xl);
      isolation: isolate;
      overflow: hidden;

      background:
        linear-gradient(145deg, rgba(255,255,255,0.105), rgba(255,255,255,0.018) 44%, rgba(255,255,255,0.055)),
        linear-gradient(180deg, rgba(255,255,255,0.052), rgba(255,255,255,0.014)),
        rgba(255,255,255,0.012);

      border: 1px solid rgba(255,255,255,0.30);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.085) inset,
        0 1px 0 rgba(255,255,255,0.64) inset,
        0 -1px 0 rgba(255,255,255,0.10) inset,
        0 26px 72px rgba(0,0,0,0.44),
        0 0 80px rgba(165,200,255,0.06);

      backdrop-filter: blur(13px) saturate(210%) contrast(1.08);
      -webkit-backdrop-filter: blur(13px) saturate(210%) contrast(1.08);

      opacity: 0;
      transform: translateY(32px) scale(.945);
      animation: cardIn 1.35s var(--ease-elastic) forwards;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -3;
      border-radius: calc(var(--radius-xl) - 1px);
      background:
        radial-gradient(circle at 24% 0%, rgba(255,255,255,0.38), transparent 24%),
        radial-gradient(circle at 92% 100%, rgba(120,170,255,0.13), transparent 28%),
        linear-gradient(120deg, rgba(255,255,255,0.14), transparent 30%, rgba(255,255,255,0.055) 58%, transparent 80%);
      opacity: .9;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      border-radius: inherit;
      background:
        linear-gradient(
          112deg,
          transparent 0%,
          transparent 30%,
          rgba(255,255,255,0.28) 43%,
          rgba(255,255,255,0.06) 52%,
          transparent 66%,
          transparent 100%
        );
      transform: translateX(-140%);
      animation: cardSweep 5.8s 1.1s var(--ease-slow) infinite;
    }

    .chrome-border {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      border-radius: inherit;
      padding: 1px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,.92),
          rgba(255,255,255,.10) 16%,
          rgba(255,255,255,.68) 30%,
          rgba(255,255,255,.08) 46%,
          rgba(255,255,255,.72) 64%,
          rgba(255,255,255,.16) 78%,
          rgba(255,255,255,.88)
        );
      opacity: .72;
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      animation: chromePulse 4.6s ease-in-out infinite;
    }

    .glass-reflection {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      border-radius: inherit;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.28) 0%, transparent 21%),
        linear-gradient(315deg, rgba(255,255,255,0.13) 0%, transparent 26%),
        radial-gradient(circle at 50% -10%, rgba(255,255,255,0.24), transparent 34%);
      opacity: .6;
      mix-blend-mode: screen;
    }

    .liquid-layer {
      position: absolute;
      inset: -35%;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.16), transparent 14%),
        radial-gradient(circle at 68% 66%, rgba(134,180,255,0.11), transparent 16%),
        radial-gradient(circle at 54% 46%, rgba(255,255,255,0.07), transparent 12%);
      filter: blur(28px);
      opacity: .58;
      animation: liquidFloat 12s ease-in-out infinite alternate;
    }

    .card-top {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      padding: 5px 0 18px;
    }

    .avatar-shell {
      position: relative;
      width: 128px;
      height: 128px;
      padding: 7px;
      border-radius: 999px;

      background:
        linear-gradient(145deg, rgba(255,255,255,0.28), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.028);

      border: 1px solid rgba(255,255,255,0.36);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12) inset,
        0 1px 0 rgba(255,255,255,0.70) inset,
        0 18px 38px rgba(0,0,0,0.38),
        0 0 38px rgba(255,255,255,0.08);

      backdrop-filter: blur(11px) saturate(210%);
      -webkit-backdrop-filter: blur(11px) saturate(210%);

      opacity: 0;
      transform: translateY(16px) scale(.9);
      animation:
        avatarIn 1.15s .25s var(--ease-elastic) forwards,
        avatarFloat 5.5s 1.5s ease-in-out infinite;
    }

  .avatar-shell::before {
    content: "";
    position: absolute;
    inset: -10px;
    z-index: -1;
    border-radius: inherit;
    background:
      radial-gradient(circle, rgba(255,255,255,0.28) 0%, rgba(170,215,255,0.12) 38%, transparent 72%);
    filter: blur(10px);
    opacity: .62;
    animation: avatarGlowPulse 4.8s ease-in-out infinite;
  }

    .avatar-shell::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.36);
      pointer-events: none;
    }

    .avatar-ring {
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.50);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.68),
        inset 0 -1px 0 rgba(255,255,255,0.12),
        0 0 22px rgba(255,255,255,0.10);
      z-index: 2;
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.42);
      background: rgba(255,255,255,0.04);
    }

    .links {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 11px;
    }

    .link-btn {
      --accent: rgba(255,255,255,0.82);
      --accent-glow: rgba(255,255,255,0.13);
      --label-gradient: linear-gradient(135deg, #fff, #c7d8ff);

      position: relative;
      width: 100%;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 11px 13px 11px 11px;
      border-radius: var(--radius-md);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.23);

      background:
        linear-gradient(145deg, rgba(255,255,255,0.115), rgba(255,255,255,0.018) 48%, rgba(255,255,255,0.065)),
        linear-gradient(180deg, rgba(255,255,255,0.044), rgba(255,255,255,0.014)),
        rgba(255,255,255,0.012);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.055) inset,
        0 1px 0 rgba(255,255,255,0.42) inset,
        0 -1px 0 rgba(255,255,255,0.07) inset,
        0 13px 28px rgba(0,0,0,0.23);

      backdrop-filter: blur(10px) saturate(215%) contrast(1.08);
      -webkit-backdrop-filter: blur(10px) saturate(215%) contrast(1.08);

      overflow: hidden;
      isolation: isolate;

      opacity: 0;
      transform: translateY(24px) scale(.965);
      animation:
        riseFade 1.02s var(--delay) var(--ease-slow) forwards,
        buttonBreath 5.6s calc(var(--delay) + .7s) ease-in-out infinite;

      transition:
        transform .45s var(--ease-out),
        border-color .45s var(--ease-out),
        box-shadow .45s var(--ease-out),
        background .45s var(--ease-out);
    }

    .link-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(112deg, transparent 0%, transparent 31%, rgba(255,255,255,0.28) 47%, transparent 65%, transparent 100%);
      transform: translateX(-128%);
      transition: transform 1.05s var(--ease-slow);
    }

    .link-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 96% 100%, var(--accent-glow), transparent 38%),
        radial-gradient(circle at 0% 0%, rgba(255,255,255,0.12), transparent 29%);
      opacity: .94;
    }

    .link-btn:hover {
      transform: translateY(-5px) scale(1.012);
      border-color: rgba(255,255,255,0.38);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.09) inset,
        0 1px 0 rgba(255,255,255,0.58) inset,
        0 -1px 0 rgba(255,255,255,0.08) inset,
        0 20px 44px rgba(0,0,0,0.32),
        0 0 34px var(--accent-glow);
    }

    .link-btn:hover::before {
      transform: translateX(128%);
    }

    .link-btn:active {
      transform: translateY(-1px) scale(.99);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .icon-wrap {
      position: relative;
      flex: 0 0 auto;
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 17px;
      color: var(--accent);
      border: 1px solid rgba(255,255,255,0.25);

      background:
        linear-gradient(145deg, rgba(255,255,255,0.17), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.015);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.07) inset,
        0 1px 0 rgba(255,255,255,0.40) inset,
        0 9px 20px rgba(0,0,0,0.20);

      backdrop-filter: blur(8px) saturate(220%);
      -webkit-backdrop-filter: blur(8px) saturate(220%);
      overflow: hidden;
    }

    .icon-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent 48%, rgba(255,255,255,0.06));
      opacity: .75;
    }

    .icon-wrap svg {
      position: relative;
      width: 24px;
      height: 24px;
      fill: currentColor;
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }

    .label-group {
      min-width: 0;
      display: grid;
      gap: 5px;
      text-align: left;
    }

    .label {
      display: block;
      font-size: 1.02rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.035em;
      background: var(--label-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 13px var(--accent-glow));
      white-space: nowrap;
    }

    .hint {
      display: block;
      font-size: .86rem;
      line-height: 1.1;
      color: var(--muted);
      max-width: 25ch;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      position: relative;
      flex: 0 0 auto;
      width: 39px;
      height: 39px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: rgba(255,255,255,0.80);
      border: 1px solid rgba(255,255,255,0.22);

      background:
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.018)),
        rgba(255,255,255,0.012);

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.34),
        0 8px 20px rgba(0,0,0,0.18);

      transition:
        transform .45s var(--ease-out),
        border-color .45s var(--ease-out),
        color .45s var(--ease-out);
    }

    .link-btn:hover .arrow {
      transform: translateX(4px) scale(1.06);
      border-color: rgba(255,255,255,0.38);
      color: #fff;
    }

    .instagram {
      --accent: #ff77c5;
      --accent-glow: rgba(255, 91, 177, 0.23);
      --label-gradient: linear-gradient(135deg, #ffd06c 0%, #ff7a57 24%, #ff3e79 52%, #d75bff 100%);
    }

    .telegram {
      --accent: #76c9ff;
      --accent-glow: rgba(70, 174, 255, 0.23);
      --label-gradient: linear-gradient(135deg, #8ee2ff 0%, #37aef5 48%, #7897ff 100%);
    }

    .tiktok {
      --accent: #ffffff;
      --accent-glow: rgba(37, 244, 238, 0.21);
      --label-gradient: linear-gradient(135deg, #ffffff 0%, #25f4ee 42%, #fe2c55 78%, #ffffff 100%);
    }

    .boosty {
      --accent: #ffb15f;
      --accent-glow: rgba(255, 139, 36, 0.22);
      --label-gradient: linear-gradient(135deg, #ffd6a0 0%, #ff8a24 46%, #ffbb6f 100%);
    }

    .crypto {
      --accent: #ffdc78;
      --accent-glow: rgba(255, 210, 96, 0.24);
      --label-gradient: linear-gradient(135deg, #fff4bd 0%, #ffc84a 46%, #ffef9b 100%);
    }

    .fansly {
      --accent: #64d8ff;
      --accent-glow: rgba(91, 217, 255, 0.25);
      --label-gradient: linear-gradient(135deg, #d9f7ff 0%, #5edcff 42%, #8d8bff 100%);
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.08), transparent 38%),
        rgba(0,0,0,0.32);
      backdrop-filter: blur(8px) saturate(145%);
      -webkit-backdrop-filter: blur(8px) saturate(145%);
      opacity: 0;
      visibility: hidden;
      transition:
        opacity .48s var(--ease-out),
        visibility .48s var(--ease-out);
    }

    .sheet-backdrop.active {
      opacity: 1;
      visibility: visible;
    }

    .sheet {
      position: relative;
      width: min(100%, 540px);
      border-radius: 34px;
      padding: 16px;
      overflow: hidden;
      isolation: isolate;
      border: 1px solid rgba(255,255,255,0.27);

      background:
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02) 48%, rgba(255,255,255,0.065)),
        linear-gradient(180deg, rgba(255,255,255,0.052), rgba(255,255,255,0.014)),
        rgba(255,255,255,0.018);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08) inset,
        0 1px 0 rgba(255,255,255,0.48) inset,
        0 28px 80px rgba(0,0,0,0.56),
        0 0 70px rgba(255,205,92,0.07);

      backdrop-filter: blur(14px) saturate(220%) contrast(1.08);
      -webkit-backdrop-filter: blur(14px) saturate(220%) contrast(1.08);

      transform: translateY(112%) scale(.96);
      transition: transform .82s var(--ease-elastic);
    }

    .sheet-backdrop.active .sheet {
      transform: translateY(0) scale(1);
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -2;
      border-radius: 33px;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,0.25), transparent 30%),
        radial-gradient(circle at 92% 100%, rgba(255,207,92,0.12), transparent 33%),
        linear-gradient(120deg, rgba(255,255,255,0.11), transparent 36%, rgba(255,255,255,0.04) 64%, transparent);
    }

    .sheet::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(112deg, transparent 10%, rgba(255,255,255,0.18) 46%, transparent 66%);
      transform: translateX(-130%);
      animation: sheetSweep 5s 1s var(--ease-slow) infinite;
    }

    .sheet-handle {
      width: 68px;
      height: 6px;
      margin: 2px auto 16px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.18));
      box-shadow:
        0 1px 0 rgba(255,255,255,0.42) inset,
        0 0 18px rgba(255,255,255,0.16);
    }

    .sheet-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .sheet-kicker {
      margin: 0 0 5px;
      color: rgba(255,255,255,0.48);
      font-size: .74rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .sheet-title {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1;
      letter-spacing: -0.065em;
      font-weight: 950;
      color: transparent;
      background:
        linear-gradient(180deg, #ffffff 0%, #ffe9aa 34%, #c98f20 58%, #fff4c8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 0 22px rgba(255,204,91,0.12));
    }

    .sheet-close {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      cursor: pointer;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.24);
      color: rgba(255,255,255,0.78);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.025)),
        rgba(255,255,255,0.012);
      box-shadow:

  <script>
    const mainCard = document.getElementById("mainCard");
    const cryptoSheet = document.getElementById("cryptoSheet");
    const openCrypto = document.getElementById("openCrypto");
    const closeCrypto = document.getElementById("closeCrypto");
    const copyButtons = document.querySelectorAll("[data-copy]");

    let pointerRAF = 0;

    function openSheet() {
      cryptoSheet.classList.add("active");
      cryptoSheet.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeSheet() {
      cryptoSheet.classList.remove("active");
      cryptoSheet.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    openCrypto.addEventListener("click", openSheet);
    closeCrypto.addEventListener("click", closeSheet);

    cryptoSheet.addEventListener("click", (event) => {
      if (event.target === cryptoSheet) closeSheet();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeSheet();
    });

    copyButtons.forEach((button) => {
      button.addEventListener("click", async () => {
        const value = button.getAttribute("data-copy") || "";
        const oldText = button.textContent;

        try {
          await navigator.clipboard.writeText(value);
          button.textContent = "Copied";
          button.classList.add("copied");

          setTimeout(() => {
            button.textContent = oldText;
            button.classList.remove("copied");
          }, 1450);
        } catch {
          button.textContent = "Error";

          setTimeout(() => {
            button.textContent = oldText;
          }, 1450);
        }
      });
    });

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function handlePointerMove(event) {
      if (!mainCard || window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

      cancelAnimationFrame(pointerRAF);

      pointerRAF = requestAnimationFrame(() => {
        const rect = mainCard.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width - 0.5;
        const y = (event.clientY - rect.top) / rect.height - 0.5;

        const rotateX = clamp(y * -5.5, -5.5, 5.5);
        const rotateY = clamp(x * 5.5, -5.5, 5.5);

        mainCard.style.transform = `
          perspective(920px)
          rotateX(${rotateX}deg)
          rotateY(${rotateY}deg)
          translateY(0)
          scale(1)
        `;
      });
    }

    function resetPointer() {
      if (!mainCard) return;
      mainCard.style.transform = "";
    }

    mainCard.addEventListener("pointermove", handlePointerMove);
    mainCard.addEventListener("pointerleave", resetPointer);
  </script>
</body>
</html>
