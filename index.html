<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links</title>
  <style>
    :root {
      --bg-1: #dde0e8;
      --bg-2: #d7dde6;
      --bg-3: #cfd8e3;
      --text: #312d46;
      --muted: #6f6a8d;
      --white-1: rgba(255,255,255,0.42);
      --white-2: rgba(255,255,255,0.26);
      --white-3: rgba(255,255,255,0.16);
      --line: rgba(255,255,255,0.28);
      --chrome-line: rgba(255,255,255,0.62);
      --chrome-shadow: 0 18px 50px rgba(92, 98, 124, 0.18);
      --soft-shadow: 0 10px 26px rgba(91, 94, 121, 0.12);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --ease-out: cubic-bezier(.22,1,.36,1);
      --ease-slow: cubic-bezier(.16,1,.3,1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 22%, rgba(232, 171, 193, 0.18), transparent 24%),
        radial-gradient(circle at 82% 14%, rgba(164, 191, 230, 0.18), transparent 26%),
        radial-gradient(circle at 68% 84%, rgba(255, 212, 128, 0.12), transparent 22%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      right: -9rem;
      bottom: -10rem;
      background: rgba(170, 196, 232, 0.50);
      animation: blobFloat 22s ease-in-out infinite reverse;
    }

    .noise,
    .vignette,
    .top-light,
    .chrome-wash {
      background:
        linear-gradient(115deg, rgba(255,255,255,0.20), transparent 34%, rgba(255,255,255,0.12) 52%, transparent 70%),
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 28%, rgba(255,255,255,0.04) 72%, transparent 100%);
      opacity: 0.9;
      animation: washShift 18s ease-in-out infinite alternate;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px 18px;
    }

    .card {
      position: relative;
      width: min(100%, 460px);
      padding: 28px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255,255,255,0.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.30), rgba(255,255,255,0.12)),
        linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18) inset,
        0 1px 0 rgba(255,255,255,0.40) inset,
        0 -10px 30px rgba(255,255,255,0.06) inset,
        var(--chrome-shadow);
      backdrop-filter: blur(34px) saturate(180%);
      -webkit-backdrop-filter: blur(34px) saturate(180%);
      overflow: hidden;
      isolation: isolate;
      transform: translateY(24px) scale(.96);
      opacity: 0;
      animation: cardReveal 1.9s var(--ease-slow) forwards;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: calc(var(--radius-xl) - 1px);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.42), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      z-index: -2;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(110deg, rgba(255,255,255,0.18), transparent 24%, transparent 72%, rgba(255,255,255,0.10)),
        radial-gradient(circle at 82% 100%, rgba(171, 224, 203, 0.22), transparent 26%);
      z-index: -1;
      pointer-events: none;
    }

    .card-shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, transparent 22%, transparent 68%, rgba(255,255,255,0.12) 100%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0.76));
      opacity: .98;
    }

    .header {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
      opacity: 0;
      transform: translateY(30px) scale(.94);
      animation: riseFade 1.45s .38s var(--ease-slow) forwards;
    }

    .avatar-shell {
      position: relative;
      width: 136px;
      height: 136px;
      padding: 8px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.68), rgba(255,255,255,0.18));
      border: 1px solid rgba(255,255,255,0.46);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.26) inset,
        0 1px 0 rgba(255,255,255,0.92) inset,
        0 12px 34px rgba(98, 101, 133, 0.22),
        0 -10px 22px rgba(255,255,255,0.12) inset;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
    }

    .avatar-shell::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: inherit;
      background: radial-gradient(circle, rgba(255,255,255,0.28), transparent 68%);
      filter: blur(10px);
      z-index: -1;
    }

    .avatar {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.60);
      background: rgba(255,255,255,0.18);
    }

    .links {
      display: grid;
      gap: 8px;
      position: relative;
    }

    .divider {
      height: 1px;
      margin: 0 12px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.42), transparent);
      opacity: 0;
      transform: scaleX(.7);
      animation: dividerIn 1.2s calc(var(--delay) + .34s) var(--ease-out) forwards;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      border-radius: 23px;
      border: 1px solid rgba(255,255,255,0.30);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.16)),
        linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.16) inset,
        0 1px 0 rgba(255,255,255,0.56) inset,
        0 -8px 18px rgba(255,255,255,0.08) inset,
        var(--soft-shadow);
      color: var(--text);
      text-decoration: none;
      backdrop-filter: blur(18px) saturate(165%);
      -webkit-backdrop-filter: blur(18px) saturate(165%);
      overflow: hidden;
      isolation: isolate;
      transition: transform .42s var(--ease-out), box-shadow .42s var(--ease-out), border-color .42s var(--ease-out), background .42s var(--ease-out);
      opacity: 0;
      transform: translateY(34px) scale(.96);
      animation: riseFade 1.35s var(--delay) var(--ease-slow) forwards;
    }

    .link-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 16%, rgba(255,255,255,0.28) 42%, transparent 67%);
      transform: translateX(-130%);
      transition: transform 1s var(--ease-slow);
      z-index: -1;
    }

    .link-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 100% 100%, var(--accent-glow, rgba(255,255,255,0.08)), transparent 34%);
      opacity: .95;
      z-index: -2;
    }

    .link-btn:hover {
      transform: translateY(-4px) scale(1.012);
      border-color: rgba(255,255,255,0.46);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.20) inset,
        0 1px 0 rgba(255,255,255,0.72) inset,
        0 -8px 18px rgba(255,255,255,0.10) inset,
        0 18px 34px rgba(84, 88, 116, 0.16);
    }

    .link-btn:hover::before {
      transform: translateX(130%);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .icon-wrap {
      flex: 0 0 auto;
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.38);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.46), rgba(255,255,255,0.16));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18) inset,
        0 1px 0 rgba(255,255,255,0.82) inset,
        0 8px 20px rgba(94, 97, 125, 0.10);
      color: var(--accent, #5f5a78);
    }

    .icon-wrap svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .label-group {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .label {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: var(--label-gradient, linear-gradient(135deg, #4b4668, #6d678d));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hint {
      font-size: 0.88rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 24ch;
      line-height: 1.1;
    }

    .arrow {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.36);
      background: linear-gradient(180deg, rgba(255,255,255,0.30), rgba(255,255,255,0.16));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.72);
      color: var(--accent, #60597b);
      transition: transform .38s var(--ease-out), background .38s var(--ease-out), border-color .38s var(--ease-out);
    }

    .link-btn:hover .arrow {
      transform: translateX(4px) scale(1.05);
      border-color: rgba(255,255,255,0.52);
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.20));
    }

    .instagram {
      --accent: #8b5887;
      --accent-glow: rgba(243, 142, 180, 0.18);
      --label-gradient: linear-gradient(135deg, #f09433 0%, #e6683c 20%, #dc2743 45%, #cc2366 70%, #bc1888 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.16)),
        linear-gradient(120deg, rgba(240,148,51,0.10), rgba(220,39,67,0.08) 38%, rgba(188,24,136,0.10) 100%);
      background-size: 100% 100%, 220% 220%;
      animation: riseFade 1.35s var(--delay) var(--ease-slow) forwards, accentFlow 10s ease-in-out infinite;
    }

    .telegram {
      --accent: #4f7dcd;
      --accent-glow: rgba(111, 174, 255, 0.16);
      --label-gradient: linear-gradient(135deg, #2aabee 0%, #229ed9 50%, #5e7cff 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.16)),
        linear-gradient(120deg, rgba(42,171,238,0.10), rgba(94,124,255,0.09) 100%);
      background-size: 100% 100%, 220% 220%;
      animation: riseFade 1.35s var(--delay) var(--ease-slow) forwards, accentFlow 11s ease-in-out infinite;
    }

    .tiktok {
      --accent: #1b1b2f;
      --accent-glow: rgba(37, 244, 238, 0.12);
      --label-gradient: linear-gradient(135deg, #111111 0%, #25f4ee 46%, #fe2c55 74%, #111111 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.16)),
        linear-gradient(120deg, rgba(37,244,238,0.08), rgba(254,44,85,0.07) 54%, rgba(17,17,17,0.07) 100%);
      background-size: 100% 100%, 220% 220%;
      animation: riseFade 1.35s var(--delay) var(--ease-slow) forwards, accentFlow 12s ease-in-out infinite;
    }

    .boosty {
      --accent: #d96f25;
      --accent-glow: rgba(255, 171, 85, 0.16);
      --label-gradient: linear-gradient(135deg, #ff8a24 0%, #ff6a00 56%, #ffb15c 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.16)),
        linear-gradient(120deg, rgba(255,138,36,0.09), rgba(255,106,0,0.08) 58%, rgba(255,177,92,0.08) 100%);
      background-size: 100% 100%, 220% 220%;
      animation: riseFade 1.35s var(--delay) var(--ease-slow) forwards, accentFlow 10.5s ease-in-out infinite;
    }

    .usdt {
      --accent: #d68a17;
      --accent-glow: rgba(255, 201, 86, 0.18);
      --label-gradient: linear-gradient(135deg, #ffd86b 0%, #f0a500 52%, #ffbf3f 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.16)),
        linear-gradient(120deg, rgba(255,216,107,0.10), rgba(240,165,0,0.08) 52%, rgba(255,191,63,0.10) 100%);
      background-size: 100% 100%, 220% 220%;
      animation: riseFade 1.35s var(--delay) var(--ease-slow) forwards, accentFlow 9.8s ease-in-out infinite;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 18px;
      background: rgba(28, 31, 43, 0.22);
      backdrop-filter: blur(10px) saturate(130%);
      -webkit-backdrop-filter: blur(10px) saturate(130%);
      z-index: 40;
      opacity: 0;
      visibility: hidden;
      transition: opacity .5s var(--ease-out), visibility .5s var(--ease-out);
    }

    .sheet-backdrop.active {
      opacity: 1;
      visibility: visible;
    }

    .sheet {
      position: relative;
      width: min(100%, 520px);
      border-radius: 30px 30px 24px 24px;
      padding: 16px 16px 18px;
      border: 1px solid rgba(255,255,255,0.26);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.16)),
        linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18) inset,
        0 1px 0 rgba(255,255,255,0.62) inset,
        0 24px 60px rgba(47, 51, 73, 0.24);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      transform: translateY(108%);
      transition: transform .85s var(--ease-slow);
      overflow: hidden;
    }

    .sheet-backdrop.active .sheet {
      transform: translateY(0);
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg, rgba(255,255,255,0.22), transparent 30%, transparent 68%, rgba(255,255,255,0.12)),
        radial-gradient(circle at 100% 100%, rgba(255, 208, 96, 0.22), transparent 30%),
        radial-gradient(circle at 20% 20%, rgba(255, 232, 168, 0.10), transparent 24%);
      pointer-events: none;
    }

    .sheet-handle {
      width: 64px;
      height: 6px;
      border-radius: 999px;
      margin: 2px auto 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.28));
      box-shadow: 0 1px 0 rgba(255,255,255,0.64) inset;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .sheet-title {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffe694 0%, #f2b51f 58%, #ffd15c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
    }

    .sheet-close {
      border: 0;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      cursor: pointer;
      color: #534f6d;
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.18));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.76);
    }

    .wallet-box,
    .network-box,
    .copy-box {
      display: flex;
      gap: 10px;
      padding: 12px;
      align-items: center;
      justify-content: flex-end;
    }

    .network-box {
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .network-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 228, 148, 0.26), rgba(242, 181, 31, 0.10));
      border: 1px solid rgba(255, 210, 103, 0.26);
      color: #9f6b00;
      font-weight: 700;
      font-size: .92rem;
    }

    .wallet-box {
      padding: 16px;
      margin-bottom: 12px;
    }

    .wallet-label {
      font-size: .84rem;
      color: #7a6f54;
      margin-bottom: 8px;
    }

    .wallet-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: .93rem;
      line-height: 1.5;
      color: #2c2940;
      word-break: break-all;
    }

    .copy-box {
      display: flex;
      gap: 10px;
      padding: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .copy-text {
      font-size: .9rem;
      color: #7f7158;
      padding-left: 2px;
    }

    .copy-btn {
      border: 0;
      border-radius: 14px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: .92rem;
      color: #6b4700;
      background: linear-gradient(135deg, #ffe694 0%, #f2b51f 58%, #ffd15c 100%);
      box-shadow: 0 8px 18px rgba(242, 181, 31, 0.20);
      transition: transform .28s var(--ease-out), box-shadow .28s var(--ease-out), filter .28s var(--ease-out);
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(242, 181, 31, 0.24);
      filter: saturate(1.03);
    }

    .sheet-note {
      margin-top: 12px;
      font-size: .84rem;
      color: #6d6988;
      line-height: 1.5;
    }

    @keyframes cardReveal {
      0% { opacity: 0; transform: translateY(24px) scale(.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes riseFade {
      0% { opacity: 0; transform: translateY(34px) scale(.96); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes dividerIn {
      0% { opacity: 0; transform: scaleX(.7); }
      100% { opacity: 1; transform: scaleX(1); }
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(20px, 24px, 0) scale(1.05); }
    }

    @keyframes accentFlow {
      0%, 100% { background-position: 0% 50%, 0% 50%; }
      50% { background-position: 0% 50%, 100% 50%; }
    }

    @keyframes washShift {
      0% { transform: translate3d(0,0,0) scale(1); opacity: .88; }
      50% { transform: translate3d(10px,-8px,0) scale(1.02); opacity: 1; }
      100% { transform: translate3d(-8px,10px,0) scale(1); opacity: .9; }
    }

    @media (max-width: 520px) {
      .page { padding: 22px 14px; }
      .card { padding: 18px; border-radius: 28px; }
      .avatar-shell { width: 120px; height: 120px; }
      .link-btn { padding: 14px; border-radius: 21px; }
      .icon-wrap { width: 46px; height: 46px; }
      .hint { max-width: 18ch; }
      .sheet { border-radius: 28px 28px 22px 22px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="vignette"></div>
  <div class="top-light"></div>
  <div class="chrome-wash"></div>

  <main class="page">
    <section class="card">
      <div class="card-shine"></div>

      <header class="header">
        <div class="avatar-shell">
          <img class="avatar" src="./avatar.png" alt="Avatar" />
        </div>
      </header>

      <div class="links">
        <a class="link-btn instagram" href="https://www.instagram.com/only.alichka?igsh=dzM4b2Y1NTdycTBv&utm_source=qr" target="_blank" rel="noopener noreferrer" style="--delay:.62s">
          <div class="left">
            <div class="icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.8A3.95 3.95 0 0 0 3.8 7.75v8.5a3.95 3.95 0 0 0 3.95 3.95h8.5a3.95 3.95 0 0 0 3.95-3.95v-8.5a3.95 3.95 0 0 0-3.95-3.95h-8.5Zm8.9 1.45a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.8A3.2 3.2 0 1 0 12 15.2 3.2 3.2 0 0 0 12 8.8Z"/>
              </svg>
            </div>
            <div class="label-group">
              <span class="label">Instagram</span>
              <span class="hint">@only.alichka</span>
            </div>
          </div>
          <div class="arrow" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path>
            </svg>

        <div class="wallet-value" id="walletAddress">TKu8Y6d2PzoMzBEwXFSxUJwxQCKxJiShJ6</div>
      </div>

      <div class="copy-box">
        <button class="copy-btn" type="button" id="copyWallet">Copy</button>
      </div>
    </div>

  <script>
    const sheet = document.getElementById('walletSheet');
    const openWallet = document.getElementById('openWallet');
    const closeWallet = document.getElementById('closeWallet');
    const copyWallet = document.getElementById('copyWallet');
    const walletAddress = document.getElementById('walletAddress');

    function openSheet() {
      sheet.classList.add('active');
      sheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeSheet() {
      sheet.classList.remove('active');
      sheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    openWallet.addEventListener('click', openSheet);
    closeWallet.addEventListener('click', closeSheet);

    sheet.addEventListener('click', (e) => {
      if (e.target === sheet) closeSheet();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSheet();
    });

    copyWallet.addEventListener('click', async () => {
      try {
        const text = walletAddress?.textContent?.trim() || '';
        if (!text) return;
        await navigator.clipboard.writeText(text);
        const oldText = copyWallet.textContent;
        copyWallet.textContent = 'Copied';
        setTimeout(() => {
          copyWallet.textContent = oldText;
        }, 1600);
      } catch {
        copyWallet.textContent = 'Error';
        setTimeout(() => {
          copyWallet.textContent = 'Copy';
        }, 1600);
      }
    });
  </script>
